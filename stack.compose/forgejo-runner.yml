services:
  forgejo-runner:
    build:
      context: ./stack.containers/forgejo-runner
      dockerfile: Dockerfile
    image: webservices/forgejo-runner:3.5.1
    container_name: forgejo-runner
    restart: unless-stopped
    networks:
      caddy:
        aliases:
          - forgejo-runner.${DOMAIN}
    depends_on:
      forgejo:
        condition: service_started
    environment:
      FORGEJO_INSTANCE_URL: http://forgejo:3000
      FORGEJO_RUNNER_NAME: platform-runner-1
      FORGEJO_RUNNER_LABELS: ubuntu-latest,ubuntu-22.04,linux
      DOCKER_HOST: unix:///run/podman/podman.sock
    volumes:
      - forgejo_runner_data:/data
      - forgejo_runner_token:/runner-token:ro
      - ./configs/forgejo-runner:/etc/forgejo-runner:ro
      - ./configs/forgejo-runner/entrypoint.sh:/entrypoint.sh:ro
      - ${XDG_RUNTIME_DIR:?XDG_RUNTIME_DIR must point at the rootless Podman runtime}/podman/podman.sock:/run/podman/podman.sock
      - type: bind
        source: ${FORGEJO_RUNNER_SSH_DIR:?Set FORGEJO_RUNNER_SSH_DIR to a dedicated runner-only SSH directory}
        target: /root/.ssh
        read_only: true
    command: ["sh", "/entrypoint.sh"]
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f forgejo-runner || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
